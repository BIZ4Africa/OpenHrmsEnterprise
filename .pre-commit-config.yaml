# Unified Pre-commit Configuration
# Combines best practices from OCA, BIZ4Africa, and community standards
# Focus: High code quality, security, and consistency

# Global exclusions
exclude: |
  (?x)
  # NOT INSTALLABLE ADDONS
  # END NOT INSTALLABLE ADDONS
  # Files and folders generated by bots, to avoid loops
  ^setup/|/static/description/index\.html$|
  # We don't want to mess with tool-generated files
  \.svg$|/tests/([^/]+/)?cassettes/|^\.copier-answers\.yml$|^\.github/|
  # Maybe reactivate this when all README files include prettier ignore tags?
  ^README\.md$|
  # Library files can have extraneous formatting (even minimized)
  /static/(src/)?lib/|
  # Repos using Sphinx to generate docs don't need prettying
  ^docs/_templates/.*\.html$|
  # Don't bother non-technical authors with formatting issues in docs
  readme/.*\.(rst|md)$|
  # Ignore build and dist directories in addons
  /build/|/dist/|/\.eggs/|
  # Ignore test files in addons
  /tests/samples/.*|
  # Ignore locked dependencies
  poetry\.lock|Pipfile\.lock
  # You don't usually want a bot to modify your legal texts
  (LICENSE.*|COPYING.*)

default_language_version:
  python: python3.12
  node: "18.0.0"

# ============================================================================
# LOCAL HOOKS - Custom validation rules
# ============================================================================
repos:
  - repo: local
    hooks:
      # Forbidden files detection
      - id: forbidden-files
        name: "❌ Forbidden files (reject junks)"
        entry: "found forbidden files; remove them"
        language: fail
        files: "\\.rej$"

      # English PO files check
      - id: en-po-files
        name: "❌ English PO files"
        entry: "found a en.po file; translation files should not include English"
        language: fail
        files: '[a-zA-Z0-9_]*/i18n/en\.po$'

      # Python __init__ files validation
      - id: no-unicode-strings
        name: "❌ Legacy unicode strings"
        entry: "u'"
        language: pygrep
        types: [python]
        exclude: "migrations/"

  # ============================================================================
  # DEPENDENCY MANAGEMENT - Whool
  # ============================================================================
  - repo: https://github.com/sbidoul/whool
    rev: v1.3
    hooks:
      - id: whool-init
        name: "📦 Initialize whool dependency management"

  # ============================================================================
  # BIZ4A MAINTAINER TOOLS - README generation, manifest fixes
  # ============================================================================
  - repo: https://github.com/BIZ4Africa/maintainer-tools
    rev: v0.1.1
    hooks:
      # Update NOT INSTALLABLE ADDONS section
      - id: biz4a-update-pre-commit-excluded-addons
        name: "🔄 Update excluded addons list"

      # Fix manifest website URLs
      - id: biz4a-fix-manifest-website
        name: "🔗 Fix manifest website URLs"
        args: ["https://www.biz-africa.com/"]

      # Generate README files from fragments
      - id: biz4a-gen-addon-readme
        name: "📖 Generate addon README"
        args:
          - --addons-dir=.
          - --branch=19.0
          - --org-name=BIZ4Africa
          - --repo-name=auto
          - --if-source-changed
          - --keep-source-digest
          - --convert-fragments-to-markdown

      # Generate external dependencies
      - id: biz4a-gen-external-dependencies
        name: "📋 Generate external dependencies"

  # ============================================================================
  # BIZ4AFRICA CUSTOM HOOKS - BIZ4A-specific checks (if available)
  # ============================================================================
  - repo: https://github.com/BIZ4Africa/odoo-pre-commit-hooks
    rev: v0.2.26
    hooks:
      - id: biz4a-checks-odoo-module
        name: "✓ BIZ4A Odoo module checks"
        verbose: true

      - id: xml-view-xmlid-order
        name: "✓ XML view field order"

      - id: xml-deprecated-attrs-states
        name: "✓ XML deprecated attributes and states"

      - id: biz4a-checks-po
        name: "✓ BIZ4A PO file checks"
        args: ["--fix"]

  # ============================================================================
  # CODE FORMATTING - Prettier (CSS, HTML, JSON, YAML, XML, etc.)
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: "💅 Prettier formatter (markup & config)"
        additional_dependencies:
          - "prettier@3.1.0"
          - "@prettier/plugin-xml@3.2.2"
        args:
          - --trailing-comma=all
          - --semi=true
          - --arrow-parens=always
        files: \.(css|htm|html|js|json|jsx|less|md|scss|toml|ts|tsx|xml|yaml|yml)$
        exclude: |
          (?x)
          /static/(src/)?lib/|
          ^README\.md$|
          readme/.*\.(rst|md)$

  # ============================================================================
  # JAVASCRIPT LINTING - ESLint
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.0.0
    hooks:
      - id: eslint
        name: "📝 ESLint (JavaScript)"
        verbose: true
        args:
          - --color
          - --fix
          - --max-warnings=0
        types: [javascript, jsx, ts, tsx]
        additional_dependencies:
          - eslint
          - eslint-config-prettier
          - eslint-plugin-prettier
          - prettier

  # ============================================================================
  # PYTHON FORMATTING - Black (modern, strict)
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: "26.1.0"
    hooks:
      - id: black
        name: "🐍 Black formatter (Python)"
        language_version: python3.12
        args:
          - --line-length=88
          - --target-version=py311
          - --verbose

  # ============================================================================
  # PYTHON LINTING - Ruff (fast, comprehensive)
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: "🔍 Ruff linter (Python)"
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]

      - id: ruff-format
        name: "📐 Ruff formatter (Python)"
        types: [python]

  # ============================================================================
  # STANDARD PRE-COMMIT HOOKS - File validation
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Trailing whitespace
      - id: trailing-whitespace
        name: "🗑️ Trailing whitespace"
        exclude: /README\.rst$|\.pot?$|/tests/samples/.*

      # End of file fixer
      - id: end-of-file-fixer
        name: "📍 End of file fixer"
        exclude: /README\.rst$|\.pot?$|/tests/samples/.*

      # YAML validation
      - id: check-yaml
        name: "✓ YAML validation"
        args: [--unsafe]

      # Large files check
      - id: check-added-large-files
        name: "⚠️ Large files check"
        args: [--maxkb=1000, --enforce-all]
        exclude: ^docs/.*\.pdf$

      # Debug statements
      - id: debug-statements
        name: "🐛 Debug statements"
        types: [python]

      # Case conflict
      - id: check-case-conflict
        name: "⚠️ Case conflict"

      # Docstring first
      - id: check-docstring-first
        name: "📚 Docstring position"
        types: [python]

      # Executables
      - id: check-executables-have-shebangs
        name: "🔧 Executable shebangs"

      # Merge conflicts
      - id: check-merge-conflict
        name: "⚔️ Merge conflicts"
        exclude: /README\.rst$|^docs/.*\.rst$

      # Symlinks
      - id: check-symlinks
        name: "🔗 Symlink validation"

      # XML validation
      - id: check-xml
        name: "✓ XML validation"

      # Mixed line endings
      - id: mixed-line-ending
        name: "📄 Line endings (LF)"
        args: ["--fix=lf"]

  # ============================================================================
  # ODOO CODE QUALITY - Pylint-Odoo (strict checks)
  # ============================================================================
  - repo: https://github.com/OCA/pylint-odoo
    rev: v10.0.0
    hooks:
      # Optional checks (warnings)
      - id: pylint_odoo
        name: "🔍 Pylint Odoo (warnings)"
        args:
          - --rcfile=.pylintrc
          - --exit-zero
        additional_dependencies: ["pylint==4.0.*"]
        verbose: true

      # Mandatory checks (must pass)
      - id: pylint_odoo
        name: "✅ Pylint Odoo (mandatory)"
        args:
          - --rcfile=.pylintrc-mandatory
        additional_dependencies: ["pylint==4.0.*"]
        stages: [pre-commit]
        verbose: true

  # ============================================================================
  # SECURITY - Bandit (Python security issues)
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        name: "🔐 Security check (Bandit)"
        args: [--exit-zero, -ll] # Show only high & critical
        types: [python]
        exclude: /tests/

  # ============================================================================
  # SECRETS - Prevent credentials from being committed
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: "🔒 Secret detection"
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)
          ^\.?samples/|
          \.json$

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [bandit] # Don't run on CI
  submodules: false
